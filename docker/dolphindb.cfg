# ─────────────────────────────────────────────────────────────
# DolphinDB Configuration for Docker
# Adjusted paths for /opt/ddb/server/ in the container
# ─────────────────────────────────────────────────────────────
localSite=0.0.0.0:8848:local8848
mode=single
maxMemSize=16
maxConnections=512
workerNum=4
localExecutors=3
maxBatchJobWorker=4
dataSync=1
OLAPCacheEngineSize=1
TSDBCacheEngineSize=1
newValuePartitionPolicy=add
maxPubConnections=64
subExecutors=4
perfMonitoring=false
lanCluster=0
subThrottle=1
persistenceWorkerNum=1
enableDFSQueryLog=false
enableAuditLog=false
logFile=/opt/ddb/server/log/dolphindb.log
